site_name: Trading Statistics Engine
site_description: Strategy backtesting and signal analysis engine
repo_url: https://github.com/longson84/tradingStatisticsEngine

theme:
  name: material
  palette:
    scheme: slate
    primary: teal
    accent: green
  features:
    - navigation.sections
    - navigation.expand
    - toc.integrate
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            docstring_style: google

nav:
  - Home: index.md
  - API Reference:
    - Constants: api/constants.md
    - Formatting: api/fmt.md
    - Styling: api/styling.md
    - Strategy:
      - Analytics: api/strategy/analytics.md
      - Strategies: api/strategy/strategies.md
      - Utils: api/strategy/utils.md
      - Monthly: api/strategy/monthly.md
      - Annual: api/strategy/annual.md
      - Pack: api/strategy/pack.md
      - Sweep Pack: api/strategy/sweep_pack.md
      - Batch Pack: api/strategy/batch_pack.md
      - Renderers: api/strategy/renderers.md
    - Signal:
      - Analytics: api/signal/analytics.md
      - Signals: api/signal/signals.md
      - Pack: api/signal/pack.md
      - Report: api/signal/report.md
