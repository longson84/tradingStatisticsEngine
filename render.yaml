services:
  # ── Backend API ────────────────────────────────────────────────────────────
  - type: web
    name: trading-engine-api
    runtime: python
    plan: free
    region: singapore
    buildCommand: |
      pip install uv
      uv sync --group api
    startCommand: uv run uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: UV_SYSTEM_PYTHON
        value: "1"
    healthCheckPath: /health

  # ── Frontend Static Site ───────────────────────────────────────────────────
  - type: web
    name: trading-engine-frontend
    runtime: static
    buildCommand: |
      cd frontend && npm pkg delete packageManager && rm -rf node_modules package-lock.json && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: NODE_VERSION
        value: 22.0.0
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
